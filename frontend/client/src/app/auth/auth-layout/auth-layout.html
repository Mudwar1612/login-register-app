<div class="min-h-full min-w-full">
    <!-- NAVBAR -->
    <nav class="h-15 bg-white flex items-center justify-between px-10 shadow-sm">
        <!-- LOGO -->
        <div class="w-10 h-10 rounded-full bg-gray-300"></div>
        <!-- RIGHT MENU -->
        <div class="flex items-center gap-4 text-sm">
            <!-- SEARCH + LANGUAGE -->
            <div class="flex items-center gap-5">
                <!-- SEARCH BAR -->
                <div class="flex items-center bg-gray-100 rounded-full px-4 py-2 w-48">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-500 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 104.5 4.5a7.5 7.5 0 0012.15 12.15z"/>
                    </svg>
                    <input type="text" placeholder="Search" class="bg-transparent outline-none text-sm w-full">
                </div>
                <div class="relative w-41">
                    <!-- CURRENT LANGUAGE -->
                    <button (click)="dropdownOpen = !dropdownOpen" class="w-41 text-sm text-gray-700 bg-transparent cursor-pointer flex items-center justify-between">
                        {{selectedLanguage}}
                        <span class="flextext-xs">▼</span>
                    </button>
                    <!-- DROPDOWN MENU -->
                    @if(dropdownOpen){
                    <div
                    class="absolute right-0 mt-3 w-45 bg-white rounded-xl shadow-lg border border-gray-100 p-2z-50">
                        @for(lang of languages; track lang){
                            @if(lang !== selectedLanguage){
                            <button (click)="changeLanguage(lang)" class="w-full text-left px-4 py-2 rounded-lg text-sm hover:bg-gray-100 transition">
                                {{lang}}
                            </button>
                            }
                        }
                    </div>
                    }
                </div>
                <button routerLink="/" class="px-5 py-2 rounded-lg border border-gray-300">Log In</button>
                <button routerLink="/register" class="px-5 py-2 rounded-lg bg-black text-white">Register</button>
            </div>
        </div>
    </nav>
    <!-- CONTENT -->
    <div class="w-full min-h-[calc(100vh-60px)] bg-[url('/background.jpg')] bg-cover bg-center bg-no-repeat flex items-center justify-start p-5">
        <!-- CARD -->
        <div class="w-120 h-130 bg-white/5 backdrop-blur-3xl rounded-3xl shadow-2xl m-6 p-10 border border-white/30">
            <h1 class="font-semibold text-5xl mb-3">Design with us <br> Explore with us</h1>
            <p class="text-justify">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Morbi lobortis maximus nunc, ac rhoncus odio congue quis. Sed ac semper orci, eu porttitor lacus.</p>
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
