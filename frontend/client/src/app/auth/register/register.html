<div class="min-h-screen bg-white flex items-center justify-center">
    <!-- LOGO -->
    <a routerLink="/" 
    class="absolute top-6 left-6 w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 hover:text-black transition-all group"
    title="Back to Login">
        <!-- Ikon Pintu Keluar (Logout Icon) -->
        <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 transition-transform group-hover:-translate-x-0.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
    </a>
    <div class="w-96">
        <!-- TITLE -->
        <h1 class="text-3xl font-semibold text-center mb-2">Create an account</h1>
        <p class="text-sm text-gray-500 text-center mb-10">
            Already have an account?
            <a 
            routerLink="/"
            class="underline cursor-pointer">
                Log in
            </a>
        </p>
        <!-- STEP -->
        <div class="flex items-center justify-center mb-8">
            <div class="flex items-center">
                <!-- Lingkaran 1: Aktif hanya jika step 1 -->
                <span class="w-4 h-4 rounded-full text-[10px] flex items-center justify-center transition-colors duration-300" [ngClass]="step === 1 ? 'bg-black text-white' : 'bg-gray-300 text-white'">1</span>
                <div class="w-28 h-px bg-gray-300 mx-3"></div>
                <!-- Lingkaran 2: Aktif hanya jika step 2 -->
                <span class="w-4 h-4 rounded-full text-[10px] flex items-center justify-center transition-colors duration-300" [ngClass]="step === 2 ? 'bg-black text-white' : 'bg-gray-300 text-white'">2</span>
                <div class="w-28 h-px bg-gray-300 mx-3"></div>
                <!-- Lingkaran 3: Aktif hanya jika step 3 -->
                <span class="w-4 h-4 rounded-full text-[10px] flex items-center justify-center transition-colors duration-300" [ngClass]="step === 3 ? 'bg-black text-white' : 'bg-gray-300 text-white'">3</span>
            </div>
        </div>
        <!-- LABEL STEP -->
        <div class="flex justify-between text-[11px] font-medium mb-6">
            <!-- Teks 1 aktif saat step 1 -->
            <span class="w-1/3 text-left transition-colors duration-300"  [ngClass]="step === 1 ? 'text-black font-semibold' : 'text-gray-400'">Enter your email address</span>
            <!-- Teks 2 aktif saat step 2 -->
            <span class="w-1/3 text-center transition-colors duration-300" [ngClass]="step === 2 ? 'text-black font-semibold' : 'text-gray-400'">Provide your basic info</span>
            <!-- Teks 3 aktif saat step 3 -->
            <span class="w-1/3 text-right transition-colors duration-300" [ngClass]="step === 3 ? 'text-black font-semibold' : 'text-gray-400'">Create your password</span>
        </div>
        <!-- STEP 1 -->
        @if(step === 1){
            <label class="text-sm">What's your email?</label>
            <input class="w-full mt-2 border rounded-lg p-3" placeholder="Enter your email address" [(ngModel)]="email">
        }
        <!-- STEP 2 -->
        @if(step === 2){
            <label class="text-sm">Username</label>
            <input class="w-full mt-2 border rounded-lg p-3" placeholder="Username" [(ngModel)]="username">
        }
        <!-- STEP 3 -->
        @if(step === 3){
            <label class="text-sm">Password</label>
            <input type="password" class="w-full mt-2 border rounded-lg p-3" placeholder="Password" [(ngModel)]="password">
        }
        <!-- NAVIGASI BUTTON -->
        <div class="flex gap-3 mt-6">
            <!-- Tombol Back: Hanya muncul di step 2 dan 3 -->
            @if(step > 1) {
                <button (click)="back()" class="w-1/2 border border-gray-300 text-gray-700 py-3 rounded-xl font-medium hover:bg-gray-50 transition-colors">
                    Back
                </button>
            }
            
            <!-- Tombol Next / Create Account -->
            <button (click)="next()" class="bg-black text-white py-3 rounded-xl font-medium transition-colors"
                    [ngClass]="step === 1 ? 'w-full' : 'w-1/2'">
                {{step === 3 ? 'Create Account' : 'Next'}}
            </button>
        </div>
    </div>
</div>
